<style>
    /* WhatsApp Share Box Styling */
    .whatsapp-share-box { 
        background-color: #f0fdf4; 
        border: 1px solid #bbf7d0; 
        border-right: 5px solid #25D366; 
        border-radius: 8px; 
        padding: 25px; 
        margin-top: 10px; 
        margin-bottom: 40px; 
    }
    
    .whatsapp-share-box h3 { 
        color: #166534; 
        margin-top: 0; 
        margin-bottom: 5px; 
        font-size: 1.25rem; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        font-weight: 800; 
    }
    
    .whatsapp-share-box p { 
        color: #15803d; 
        margin-bottom: 15px; 
        font-size: 0.95rem; 
        font-weight: 600; 
        line-height: 1.6;
    }
    
    /* Main wrapper for inputs and button */
    .wa-form-wrapper { 
        display: flex; 
        gap: 12px; 
        margin-top: 15px; 
        flex-wrap: wrap; 
        align-items: stretch; 
    }
    
    /* Phone number group - forced LTR so the code box is on the left and number box on the right */
    .wa-phone-group {
        display: flex;
        gap: 8px;
        flex: 1;
        min-width: 280px;
        direction: ltr; 
    }
    
    /* Country Code Select Styling */
    .wa-country-select { 
        width: 175px;
        padding: 12px; 
        border: 1px solid #d1d5db; 
        border-radius: 25px; 
        font-family: inherit; 
        font-size: 0.9rem; 
        background-color: white; 
        outline: none;
        cursor: pointer;
        direction: rtl; /* Keeps Arabic text aligned correctly inside the box */
    }
    
    /* Number Input Styling */
    .wa-number-input { 
        flex: 1; 
        min-width: 140px; 
        padding: 12px 15px; 
        border: 1px solid #d1d5db; 
        border-radius: 25px; 
        font-family: inherit; 
        font-size: 1rem; 
        outline: none; 
        transition: all 0.2s; 
        direction: ltr; /* Phone numbers should always type LTR */
    }
    
    .wa-number-input::placeholder {
        color: #9ca3af;
    }
    
    .wa-country-select:focus, .wa-number-input:focus { 
        border-color: #25D366; 
        box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2); 
    }
    
    /* Button Styling */
    .wa-btn { 
        background-color: #25D366; 
        color: white; 
        border: none; 
        padding: 12px 25px; 
        border-radius: 25px; 
        font-weight: 700; 
        font-family: 'Cairo', sans-serif; 
        cursor: pointer; 
        transition: all 0.2s; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        gap: 8px; 
        font-size: 0.95rem; 
        white-space: nowrap;
    }
    
    .wa-btn:hover { 
        background-color: #16a34a; 
        transform: translateY(-1px); 
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
        .wa-form-wrapper { flex-direction: column; }
        .wa-btn { width: 100%; }
        /* Keeps the country code and input side-by-side on mobile */
        .wa-phone-group { width: 100%; flex-direction: row; } 
    }
</style>

<script>
    function shareViaWhatsApp() {
        var countryCode = document.getElementById('wa-country-code').value;
        var rawNumber = document.getElementById('wa-number').value;
        
        // Clean the number (remove non-digits, trim leading zeros)
        var cleanNumber = rawNumber.replace(/\D/g, ''); 
        if (cleanNumber.startsWith('0')) {
            cleanNumber = cleanNumber.substring(1);
        }
        
        // Get URL and Page Title
        var pageUrl = window.location.href;
        var pageTitle = document.title.split('|')[0].trim(); 
        
        // Build message
        var message = "مرحباً، اقرأ هالمقال الطبي المفيد من منصة كشفيّة عن (" + pageTitle + "):\n\n" + pageUrl;
        var encodedMessage = encodeURIComponent(message);
        
        // Generate Link
        var waLink = "";
        if (cleanNumber) {
            waLink = "https://wa.me/" + countryCode + cleanNumber + "?text=" + encodedMessage;
        } else {
            waLink = "https://wa.me/?text=" + encodedMessage;
        }
        
        // Execute
        window.open(waLink, '_blank');
    }
</script>
