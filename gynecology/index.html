        background-color: #005eb8; 
        color: #ffffff; 
        border-color: #005eb8; 
        transform: translateY(-3px);

<div class="page-header">
    <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>صحة المرأة والحمل</h1>
</div>

<main class="disease-grid" id="diseasesContainer">
    <div class="loading-state">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
        <p>جاري جلب قائمة الأمراض...</p>
    </div>
</main>

<script>
    const supabaseUrl = 'https://sbtsfjcbkuvhjylvtezv.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNidHNmamNia3V2aGp5bHZ0ZXp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTkzNDksImV4cCI6MjA5MDk5NTM0OX0.GqsPOGcntVxKtLr56iG9IHfwqlPtdAtNVRGd2ztGkrU';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadGynecologyDiseases() {
        try {
            // جلب مواضيع النسائية والتوليد وترتيبها أبجدياً
            const { data, error } = await supabaseClient
                .from('topics')
                .select('slug, title, english_name') 
                .eq('category_id', 'gynecology')
                .order('title', { ascending: true });

            if (error) throw error;

            const container = document.getElementById('diseasesContainer');
            container.innerHTML = ''; // إزالة علامة التحميل

            if (data.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">لم يتم إضافة مواضيع في هذا القسم بعد.</p>';
                return;
            }

            data.forEach(disease => {
                const engSpan = disease.english_name ? `<span>(${disease.english_name})</span>` : '';
                
                container.innerHTML += `
                    <a href="/topic/?id=${disease.slug}" class="disease-card">
                        ${disease.title}
                        ${engSpan}
                    </a>
                `;
            });

        } catch (e) {
            console.error(e);
            document.getElementById('diseasesContainer').innerHTML = '<p style="grid-column: 1/-1; text-align:center; color: red;">حدث خطأ في جلب البيانات.</p>';
        }
    }

    window.onload = loadGynecologyDiseases;
</script>
