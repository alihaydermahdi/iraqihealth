    .spec-header { background: #ffffff; padding: 20px 25px; font-size: 1.25rem; font-weight: 800; color: #003087; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; user-select: none; }

    .doc-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 25px; text-align: center; transition: 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }

    .loading-msg { text-align: center; padding: 60px 20px; color: #005eb8; font-size: 1.2rem; font-weight: bold; width: 100%; background: white; border-radius: 12px; border: 1px dashed #cbd5e0; }

<script>
    const supabaseUrl = 'https://sbtsfjcbkuvhjylvtezv.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNidHNmamNia3V2aGp5bHZ0ZXp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTkzNDksImV4cCI6MjA5MDk5NTM0OX0.GqsPOGcntVxKtLr56iG9IHfwqlPtdAtNVRGd2ztGkrU';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let doctorsData = [];
    const accordionContainer = document.getElementById('accordionContainer');

    async function fetchDoctorsFromCloud() {
        try {
            const { data, error } = await supabaseClient.from('doctors').select('*');
            if (error) throw error;

            doctorsData = data.map(doc => ({
                id: doc.id,
                name: doc.name,
                specialty: doc.specialty_id,
                specialtyAr: doc.specialty_ar || 'تخصص طبي', // Fallback
                province: doc.province_id,
                provinceAr: doc.province_ar,
                address: doc.address,
                lat: doc.lat,
                lng: doc.lng,
                phone: doc.phone,
                hours: doc.hours,
                img: doc.image_url || 'https://ui-avatars.com/api/?name=' + doc.name + '&background=005eb8&color=fff'
            }));

            // قراءة الفلاتر من الرابط (إن جاء من الصفحة الرئيسية)
            const params = new URLSearchParams(window.location.search);
            if(params.has('spec')) document.getElementById('specialtyFilter').value = params.get('spec');
            if(params.has('city')) document.getElementById('provinceFilter').value = params.get('city');
            
            runFilter();

        } catch (error) {
            console.error(error);
            accordionContainer.innerHTML = '<div class="loading-msg" style="color:#e53e3e; border-color: #feb2b2; background: #fff5f5;"><i class="fas fa-exclamation-triangle"></i> حدث خطأ أثناء جلب البيانات.</div>';
        }
    }

    function renderGroupedDoctors(filteredData, selectedSpec) {
        accordionContainer.innerHTML = '';
        
        if(filteredData.length === 0) {
            accordionContainer.innerHTML = '<div class="loading-msg" style="color:#718096;"><i class="fas fa-search"></i> لم نجد أطباء ضمن هذا الاختيار حالياً.</div>';
            return;
        }

        // تجميع الأطباء
        const grouped = {};
        filteredData.forEach(doc => {
            if(!grouped[doc.specialty]) {
                grouped[doc.specialty] = { nameAr: doc.specialtyAr, docs: [] };
            }
            grouped[doc.specialty].docs.push(doc);
        });

        // الترتيب الأبجدي للأقسام
        const sortedSpecs = Object.keys(grouped).sort((a, b) => grouped[a].nameAr.localeCompare(grouped[b].nameAr));

        sortedSpecs.forEach(specId => {
            const group = grouped[specId];
            let docsHtml = '<div class="doctors-grid">';
            
            group.docs.forEach(doc => {
                const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${doc.lat},${doc.lng}`;
                docsHtml += `
                    <div class="doc-card">
                        <img src="${doc.img}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:15px; border: 3px solid #f0f4f5;">
                        <h3 style="margin:0 0 5px 0; color:#003087; font-size: 1.1rem;">${doc.name}</h3>
                        <div style="margin-top:15px; text-align:right; font-size:0.9rem; color: #4a5568;">
                            <p style="margin:8px 0;"><i class="fas fa-city" style="color:#a0aec0; width:20px;"></i> ${doc.provinceAr} - ${doc.address || ''}</p>
                            <p style="margin:8px 0;"><i class="fas fa-clock" style="color:#a0aec0; width:20px;"></i> ${doc.hours}</p>
                        </div>
                        <a href="${googleMapsUrl}" target="_blank" style="color: #4a5568; text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px solid #e2e8f0; transition: 0.2s;">
                            <i class="fas fa-map-marked-alt" style="color: #005eb8;"></i> عرض الموقع على الخارطة
                        </a>
                        <a href="tel:${doc.phone}" style="display:block; background:#005eb8; color:white; text-align:center; padding:12px; border-radius:8px; margin-top:10px; text-decoration:none; font-weight:bold; transition: 0.2s;">
                            <i class="fas fa-phone-alt"></i> اتصل للحجز
                        </a>
                    </div>
                `;
            });
            docsHtml += '</div>';

            const sectionId = 'spec-' + specId;
            const docCountText = group.docs.length > 2 && group.docs.length < 11 ? 'أطباء' : 'طبيب';
            
            // الفتح التلقائي الأنيق إذا كان هناك تخصص واحد فقط تم اختياره
            const isActiveClass = (selectedSpec !== 'all' && sortedSpecs.length === 1) ? 'active' : '';

            accordionContainer.innerHTML += `
                <div class="spec-section ${isActiveClass}" id="${sectionId}">
                    <div class="spec-header" onclick="toggleSection('${sectionId}')">
                        <div class="header-content">
                            <span>${group.nameAr}</span>
                            <span class="doc-count">${group.docs.length} ${docCountText}</span>
                        </div>
                        <div class="toggle-icon"><i class="fas fa-chevron-down"></i></div>
                    </div>
                    <div class="spec-body">
                        ${docsHtml}
                    </div>
                </div>
            `;
        });
    }

    function toggleSection(id) {
        const sec = document.getElementById(id);
        sec.classList.toggle('active');
    }

    function runFilter() {
        const prov = document.getElementById('provinceFilter').value;
        const spec = document.getElementById('specialtyFilter').value;
        
        const filtered = doctorsData.filter(d => {
            const matchProv = (prov === 'all' || d.province === prov);
            const matchSpec = (spec === 'all' || d.specialty === spec);
            return matchProv && matchSpec;
        });
        
        renderGroupedDoctors(filtered, spec);
    }

    function findNearest() {
        if (!navigator.geolocation) { alert("متصفحك لا يدعم تحديد الموقع."); return; }
        accordionContainer.innerHTML = '<div class="loading-msg"><i class="fas fa-spinner fa-spin"></i> جاري البحث وتصنيف الأقرب...</div>';
        
        navigator.geolocation.getCurrentPosition(pos => {
            const sorted = [...doctorsData].sort((a,b) => {
                const dA = Math.sqrt(Math.pow(a.lat-pos.coords.latitude,2)+Math.pow(a.lng-pos.coords.longitude,2));
                const dB = Math.sqrt(Math.pow(b.lat-pos.coords.latitude,2)+Math.pow(b.lng-pos.coords.longitude,2));
                return dA - dB;
            });
            
            // عند البحث بالأقرب نعرض جميع التخصصات ونجعلها مفتوحة لتسهيل الرؤية
            renderGroupedDoctors(sorted, 'all');
            document.querySelectorAll('.spec-section').forEach(sec => sec.classList.add('active'));
            
        }, () => {
            alert("يرجى تفعيل الموقع الجغرافي لتعمل هذه الميزة.");
            runFilter();
        });
    }

    window.onload = fetchDoctorsFromCloud;
</script>
