layout: default
title: "دليل الأطباء والمراكز | كشفيّـة"
permalink: /doctors/index.html
---

<script src="/doctorsData.js"></script>

<style>
    .doctors-header { text-align: center; padding: 60px 20px; background: #f0f4f5; border-bottom: 1px solid #d8dde0; }
    .search-filter-section { max-width: 1000px; margin: -40px auto 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; position: relative; z-index: 10; }
    .filter-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #003087; font-size: 0.9rem; }
    .filter-group select, .near-me-btn { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 1rem; cursor: pointer; }
    .near-me-btn { background: #005eb8; color: white; border: none; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
    .near-me-btn:hover { background: #003087; }
    .doctors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto 60px auto; padding: 0 20px; }
    .doc-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 25px; text-align: center; transition: 0.3s; }
    .doc-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: #005eb8; }
    .map-link { color: #4a5568; text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px dashed #cbd5e0; }
    .map-link:hover { color: #005eb8; background: #e6f2fc; }
</style>

<div class="doctors-header">
    <h1 style="color: #003087; font-size: 2.5rem; font-weight: 900;">دليل أطباء كشفيّـة</h1>
    <p style="font-size: 1.2rem; color: #4a5568;">ابحث عن أفضل الأطباء والمراكز الطبية في محافظتك</p>
</div>

<div class="doctors-container">
    <div class="search-filter-section">
        <div class="filter-group">
            <label>المحافظة</label>
            <select id="provinceFilter" onchange="runFilter()">
                <option value="all">كل العراق</option>
                <option value="baghdad">بغداد</option>
                <option value="basra">البصرة</option>
                <option value="nineveh">نينوى (الموصل)</option>
                <option value="erbil">أربيل</option>
                <option value="najaf">النجف الأشرف</option>
                <option value="karbala">كربلاء المقدسة</option>
                <option value="sulaymaniyah">السليمانية</option>
                <option value="kirkuk">كركوك</option>
                <option value="babil">بابل (الحلة)</option>
                <option value="anbar">الأنبار</option>
                <option value="diyala">ديالى</option>
                <option value="dhi-qar">ذي قار (الناصرية)</option>
                <option value="qadisiyah">القادسية (الديوانية)</option>
                <option value="maysan">ميسان (العمارة)</option>
                <option value="wasit">واسط (الكوت)</option>
                <option value="muthanna">المثنى (السماوة)</option>
                <option value="duhok">دهوك</option>
                <option value="saladin">صلاح الدين</option>
            </select>
        </div>
        <div class="filter-group">
            <label>التخصص</label>
            <select id="specialtyFilter" onchange="runFilter()">
                <option value="all">كل التخصصات</option>
                <option value="internal">باطنية وقلبية</option>
                <option value="peds">أطفال وسونار أطفال</option>
                <option value="gynae">نسائية وتوليد</option>
                <option value="ortho">مفاصل وعظام</option>
                <option value="derma">جلدية وليزر</option>
                <option value="eyes">عيون وجراحة ليزك</option>
                <option value="ent">أنف وأذن وحنجرة</option>
                <option value="neuro">جملة عصبية</option>
                <option value="psych">نفسية وعصبية</option>
                <option value="surgery">جراحة عامة</option>
                <option value="urology">مسالك بولية وعقم</option>
            </select>
        </div>
        <div class="filter-group" style="display: flex; align-items: flex-end;">
            <button class="near-me-btn" onclick="findNearest()">
                <i class="fas fa-location-arrow"></i> الأقرب إليّ
            </button>
        </div>
    </div>

    <div class="doctors-grid" id="doctorsGrid"></div>
</div>

<script>
    const grid = document.getElementById('doctorsGrid');

    function displayDoctors(data) {
        grid.innerHTML = '';
        if(data.length === 0) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:50px; color:#718096;"><h3>لم نجد أطباء ضمن هذا الاختيار حالياً.</h3></div>';
            return;
        }
        data.forEach(doc => {
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${doc.lat},${doc.lng}`;
            grid.innerHTML += `
                <div class="doc-card">
                    <img src="${doc.img}" style="width:80px; height:80px; border-radius:50%; margin-bottom:15px; border: 3px solid #f0f4f5;">
                    <h3 style="margin:0 0 5px 0; color:#003087;">${doc.name}</h3>
                    <span style="background:#e6f2fc; color:#005eb8; padding:4px 12px; border-radius:20px; font-size:0.85rem; font-weight:bold;">${doc.specialtyAr}</span>
                    <div style="margin-top:15px; text-align:right; font-size:0.9rem;">
                        <p style="margin:5px 0;"><i class="fas fa-city" style="color:#a0aec0; width:20px;"></i> ${doc.provinceAr}</p>
                        <p style="margin:5px 0;"><i class="fas fa-clock" style="color:#a0aec0; width:20px;"></i> ${doc.hours}</p>
                    </div>
                    <a href="${googleMapsUrl}" target="_blank" class="map-link">
                        <i class="fas fa-map-marked-alt"></i> عرض الموقع على الخارطة
                    </a>
                    <a href="tel:${doc.phone}" style="display:block; background:#005eb8; color:white; text-align:center; padding:12px; border-radius:8px; margin-top:20px; text-decoration:none; font-weight:bold;">
                        <i class="fas fa-phone-alt"></i> اتصل للحجز
                    </a>
                </div>
            `;
        });
    }

    function runFilter() {
        const prov = document.getElementById('provinceFilter').value;
        const spec = document.getElementById('specialtyFilter').value;
        const filtered = doctorsData.filter(d => (prov === 'all' || d.province === prov) && (spec === 'all' || d.specialty === spec));
        displayDoctors(filtered);
    }

    function findNearest() {
        if (!navigator.geolocation) { alert("متصفحك لا يدعم تحديد الموقع."); return; }
        navigator.geolocation.getCurrentPosition(pos => {
            const sorted = [...doctorsData].sort((a,b) => {
                const dA = Math.sqrt(Math.pow(a.lat-pos.coords.latitude,2)+Math.pow(a.lng-pos.coords.longitude,2));
                const dB = Math.sqrt(Math.pow(b.lat-pos.coords.latitude,2)+Math.pow(b.lng-pos.coords.longitude,2));
                return dA - dB;
            });
            displayDoctors(sorted);
        }, () => alert("يرجى تفعيل الموقع الجغرافي."));
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if(params.has('spec')) document.getElementById('specialtyFilter').value = params.get('spec');
        if(params.has('city')) document.getElementById('provinceFilter').value = params.get('city');
        runFilter();
    };
</script>
