<script>
    const supabaseUrl = 'https://sbtsfjcbkuvhjylvtezv.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNidHNmamNia3V2aGp5bHZ0ZXp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTkzNDksImV4cCI6MjA5MDk5NTM0OX0.GqsPOGcntVxKtLr56iG9IHfwqlPtdAtNVRGd2ztGkrU';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let doctorsData = [];
    const accordionContainer = document.getElementById('accordionContainer');

    // القائمة الكاملة للتخصصات بالترتيب المطلوب (المراكز الطبية أولاً)
    const masterSpecialties = [
        { id: 'medical-centers', nameAr: 'المراكز الطبية والمجمعات' },
        { id: 'general-practitioner', nameAr: 'طبيب ممارس' },
        { id: 'radiology', nameAr: 'الأشعة والسونار' },
        { id: 'dermatology', nameAr: 'الأمراض الجلدية' },
        { id: 'ent', nameAr: 'الأنف والأذن والحنجرة' },
        { id: 'laboratory', nameAr: 'التحاليل الطبية' },
        { id: 'allergy_immunology', nameAr: 'الحساسية والمناعة' },
        { id: 'mens-health', nameAr: 'الذكورة والعقم' },
        { id: 'endocrinology', nameAr: 'السكري والغدد الصماء' },
        { id: 'physiotherapy', nameAr: 'العلاج الطبيعي' },
        { id: 'gynecology', nameAr: 'النسائية والتوليد' },
        { id: 'pulmonology', nameAr: 'أمراض الجهاز التنفسي' },
        { id: 'gastroenterology', nameAr: 'أمراض الجهاز الهضمي والكبد' },
        { id: 'blood-immune', nameAr: 'أمراض الدم والأورام' },
        { id: 'msk', nameAr: 'أمراض العظام والمفاصل' },
        { id: 'cardiology', nameAr: 'أمراض القلب والأوعية الدموية' },
        { id: 'nephrology', nameAr: 'أمراض الكلى والمسالك البولية' },
        { id: 'neurology', nameAr: 'أمراض المخ والأعصاب' },
        { id: 'pediatric_surgery', nameAr: 'جراحة الأطفال' },
        { id: 'plastic_surgery', nameAr: 'جراحة التجميل' },
        { id: 'bariatric_surgery', nameAr: 'جراحة السمنة' },
        { id: 'cardiothoracic_surgery', nameAr: 'جراحة القلب والصدر' },
        { id: 'neurosurgery', nameAr: 'جراحة المخ والأعصاب' },
        { id: 'general_surgery', nameAr: 'جراحة عامة وجراحة المناظير' },
        { id: 'family_medicine', nameAr: 'طب الأسرة' },
        { id: 'dentistry', nameAr: 'طب الأسنان' },
        { id: 'pediatrics', nameAr: 'طب الأطفال والخدج' },
        { id: 'eyes', nameAr: 'طب وجراحة العيون' },
        { id: 'mental-health', nameAr: 'الطب النفسي والصحة النفسية' }
    ];

    async function fetchDoctorsFromCloud() {
        try {
            const { data, error } = await supabaseClient.from('doctors').select('*');
            if (error) throw error;

            doctorsData = data.map(doc => ({
                id: doc.id,
                name: doc.name,
                specialty: doc.specialty_id,
                province: doc.province_id,
                provinceAr: doc.province_ar,
                address: doc.address,
                lat: doc.lat,
                lng: doc.lng,
                phone: doc.phone,
                hours: doc.hours,
                img: doc.image_url || 'https://ui-avatars.com/api/?name=' + doc.name + '&background=005eb8&color=fff'
            }));

            const params = new URLSearchParams(window.location.search);
            if(params.has('spec')) document.getElementById('specialtyFilter').value = params.get('spec');
            if(params.has('city')) document.getElementById('provinceFilter').value = params.get('city');
            
            runFilter();

        } catch (error) {
            console.error(error);
            accordionContainer.innerHTML = '<div class="loading-msg" style="color:red;">حدث خطأ أثناء جلب البيانات.</div>';
        }
    }

    function renderAccordions(filteredData, selectedSpec) {
        accordionContainer.innerHTML = '';
        
        // تجميع البيانات الحالية
        const grouped = {};
        filteredData.forEach(doc => {
            if(!grouped[doc.specialty]) grouped[doc.specialty] = [];
            grouped[doc.specialty].push(doc);
        });

        // بناء الأقسام بناءً على القائمة الكاملة (Master List)
        masterSpecialties.forEach(spec => {
            // إذا كان المستخدم يبحث عن تخصص معين، نخفي التخصصات الأخرى
            if (selectedSpec !== 'all' && selectedSpec !== spec.id) return;

            const docsInGroup = grouped[spec.id] || [];
            const isActive = (selectedSpec !== 'all' || spec.id === 'medical-centers') ? 'active' : '';
            const countClass = docsInGroup.length === 0 ? 'count-zero' : '';
            const countText = docsInGroup.length === 1 ? '1 نتيجة' : `${docsInGroup.length} نتائج`;

            let bodyContent = '';
            if (docsInGroup.length > 0) {
                bodyContent = '<div class="doctors-grid">';
                docsInGroup.forEach(doc => {
                    const googleMapsUrl = `https://www.google.com/maps?q=${doc.lat},${doc.lng}`;
                    bodyContent += `
                        <div class="doc-card">
                            <img src="${doc.img}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:15px; border: 3px solid #f0f4f5;">
                            <h3 style="margin:0 0 5px 0; color:#003087; font-size: 1.1rem;">${doc.name}</h3>
                            <div style="margin-top:15px; text-align:right; font-size:0.9rem; color: #4a5568;">
                                <p style="margin:8px 0;"><i class="fas fa-city" style="color:#a0aec0; width:20px;"></i> ${doc.provinceAr} - ${doc.address || ''}</p>
                                <p style="margin:8px 0;"><i class="fas fa-clock" style="color:#a0aec0; width:20px;"></i> ${doc.hours}</p>
                            </div>
                            <a href="${googleMapsUrl}" target="_blank" style="color: #4a5568; text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px solid #e2e8f0;">
                                <i class="fas fa-map-marked-alt" style="color: #005eb8;"></i> الموقع على الخارطة
                            </a>
                            <a href="tel:${doc.phone}" style="display:block; background:#005eb8; color:white; text-align:center; padding:12px; border-radius:8px; margin-top:10px; text-decoration:none; font-weight:bold;">
                                <i class="fas fa-phone-alt"></i> اتصل للحجز
                            </a>
                        </div>
                    `;
                });
                bodyContent += '</div>';
            } else {
                bodyContent = '<div class="empty-msg">لا يوجد أطباء مسجلين في هذا القسم حالياً ضمن المحافظة المختارة.</div>';
            }

            const specialClass = spec.id === 'medical-centers' ? 'medical-centers' : '';

            accordionContainer.innerHTML += `
                <div class="spec-section ${isActive} ${specialClass}" id="sec-${spec.id}">
                    <div class="spec-header" onclick="toggleSection('sec-${spec.id}')">
                        <div class="header-content">
                            <span>${spec.nameAr}</span>
                            <span class="doc-count ${countClass}">${countText}</span>
                        </div>
                        <div class="toggle-icon"><i class="fas fa-chevron-down"></i></div>
                    </div>
                    <div class="spec-body">
                        ${bodyContent}
                    </div>
                </div>
            `;
        });
    }

    function toggleSection(id) {
        document.getElementById(id).classList.toggle('active');
    }

    function runFilter() {
        const prov = document.getElementById('provinceFilter').value;
        const spec = document.getElementById('specialtyFilter').value;
        
        const filtered = doctorsData.filter(d => {
            const matchProv = (prov === 'all' || d.province === prov);
            const matchSpec = (spec === 'all' || d.specialty === spec);
            return matchProv && matchSpec;
        });
        
        renderAccordions(filtered, spec);
    }

    function findNearest() {
        if (!navigator.geolocation) { alert("متصفحك لا يدعم تحديد الموقع."); return; }
        navigator.geolocation.getCurrentPosition(pos => {
            const sorted = [...doctorsData].sort((a,b) => {
                const dA = Math.sqrt(Math.pow(a.lat-pos.coords.latitude,2)+Math.pow(a.lng-pos.coords.longitude,2));
                const dB = Math.sqrt(Math.pow(b.lat-pos.coords.latitude,2)+Math.pow(b.lng-pos.coords.longitude,2));
                return dA - dB;
            });
            renderAccordions(sorted, 'all');
            document.querySelectorAll('.spec-section').forEach(s => s.classList.add('active'));
        }, () => alert("يرجى تفعيل الموقع الجغرافي."));
    }

    window.onload = fetchDoctorsFromCloud;
</script>
